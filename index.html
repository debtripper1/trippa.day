<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self';">
  <title>trippa.day</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/icons/windows_button.png">
</head>
<body>
  <div id="desktop">
    <div id="icon-grid">
      <div class="desktop-icon" data-app="files" data-window="My Computer" role="button" tabindex="0" aria-label="My Computer">
        <div class="desktop-icon-img"><img src="assets/icons/computer.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">My Computer</div>
      </div>
      <div class="desktop-icon" data-app="browser" data-window="Browser" role="button" tabindex="0" aria-label="Browser">
        <div class="desktop-icon-img"><img src="assets/icons/world.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">Browser</div>
      </div>
      <div class="desktop-icon" data-app="recycle" data-window="Bin" role="button" tabindex="0" aria-label="Bin">
        <div class="desktop-icon-img"><img src="assets/icons/recycle_bin.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">Bin</div>
      </div>
    </div>

    <div id="window-manager"></div>

    <div id="start-menu">
      <div id="start-sidebar">
        <span>trippa.day</span>
      </div>
      <div id="start-items">
        <div class="start-submenu-item">
          <span class="start-item-icon"><img src="assets/icons/program_manager.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Programs</span>
          <span class="start-submenu-arrow">▶</span>
          <div class="start-submenu">
            <div class="start-submenu-item">
              <span class="start-item-icon"><img src="assets/icons/program_manager.png" width="16" height="16" style="vertical-align:middle;"></span>
              <span class="start-item-label">Games</span>
              <span class="start-submenu-arrow">▶</span>
              <div class="start-submenu">
                <div class="start-item" data-app="snake">
                  <span class="start-item-icon"><img src="assets/icons/program_manager.png" width="16" height="16" style="vertical-align:middle;"></span>
                  <span class="start-item-label">Snake</span>
                </div>
                <div class="start-item" data-app="minesweeper">
                  <span class="start-item-icon"><img src="assets/icons/help.png" width="16" height="16" style="vertical-align:middle;"></span>
                  <span class="start-item-label">Minesweeper</span>
                </div>
              </div>
            </div>
            <div class="start-submenu-item">
              <span class="start-item-icon"><img src="assets/icons/settings.png" width="16" height="16" style="vertical-align:middle;"></span>
              <span class="start-item-label">Utilities</span>
              <span class="start-submenu-arrow">▶</span>
              <div class="start-submenu">
                <div class="start-item" data-app="paint">
                  <span class="start-item-icon"><img src="assets/icons/paint.png" width="16" height="16" style="vertical-align:middle;"></span>
                  <span class="start-item-label">Paint</span>
                </div>
                <div class="start-item" data-app="notepad">
                  <span class="start-item-icon"><img src="assets/icons/notepad.png" width="16" height="16" style="vertical-align:middle;"></span>
                  <span class="start-item-label">Notepad</span>
                </div>
                <div class="start-item" data-app="calc">
                  <span class="start-item-icon"><img src="assets/icons/computer.png" width="16" height="16" style="vertical-align:middle;"></span>
                  <span class="start-item-label">Calculator</span>
                </div>
                <div class="start-item" data-app="music">
                  <span class="start-item-icon"><img src="assets/icons/sound.png" width="16" height="16" style="vertical-align:middle;"></span>
                  <span class="start-item-label">Music Player</span>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div class="start-item" data-app="settings">
          <span class="start-item-icon"><img src="assets/icons/settings.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Settings</span>
        </div>
        <hr>
        <div class="start-item" id="start-shutdown">
          <span class="start-item-icon"><img src="assets/icons/shutdown.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Shut Down...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="taskbar">
    <button id="start-button">
      <span class="start-logo"><img src="assets/icons/windows_button.png" width="16" height="16" style="vertical-align:middle;"></span>
      <span>Start</span>
    </button>
    <div id="taskbar-items"></div>
    <div id="system-tray">
      <span id="clock"></span>
    </div>
  </div>

  <script src="js/desktop.js"></script>
</body>
</html>
