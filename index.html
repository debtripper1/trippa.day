<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; media-src 'self';">
  <title>trippa.day</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="icon" type="image/png" href="assets/icons/windows_button.png">
</head>
<body>
  <div id="desktop">
    <div id="icon-grid">
      <div class="desktop-icon" data-app="music" data-window="Music Player" role="button" tabindex="0" aria-label="My Music">
        <div class="desktop-icon-img"><img src="assets/icons/sound.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">My Music</div>
      </div>
      <div class="desktop-icon" data-app="files" data-window="File Browser" role="button" tabindex="0" aria-label="File Browser">
        <div class="desktop-icon-img"><img src="assets/icons/computer.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">My Files</div>
      </div>
      <div class="desktop-icon" data-app="downloads" data-window="Downloads" role="button" tabindex="0" aria-label="Downloads">
        <div class="desktop-icon-img"><img src="assets/icons/download.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">Downloads</div>
      </div>
      <div class="desktop-icon" data-app="apps" data-window="Web Apps" role="button" tabindex="0" aria-label="Web Apps">
        <div class="desktop-icon-img"><img src="assets/icons/world.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">Web Apps</div>
      </div>
      <div class="desktop-icon" data-app="settings" data-window="Settings" role="button" tabindex="0" aria-label="Settings">
        <div class="desktop-icon-img"><img src="assets/icons/settings.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">Settings</div>
      </div>
      <div class="desktop-icon" data-app="recycle" data-window="Recycle Bin" role="button" tabindex="0" aria-label="Recycle Bin">
        <div class="desktop-icon-img"><img src="assets/icons/recycle_bin.png" alt="" width="32" height="32"></div>
        <div class="desktop-icon-label">Recycle Bin</div>
      </div>
    </div>

    <div id="window-manager"></div>

    <div id="start-menu">
      <div id="start-sidebar">
        <span>trippa.day</span>
      </div>
      <div id="start-items">
        <div class="start-item" data-app="music">
          <span class="start-item-icon"><img src="assets/icons/sound.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Music Player</span>
        </div>
        <div class="start-item" data-app="files">
          <span class="start-item-icon"><img src="assets/icons/computer.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">File Browser</span>
        </div>
        <div class="start-item" data-app="downloads">
          <span class="start-item-icon"><img src="assets/icons/download.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Downloads</span>
        </div>
        <div class="start-item" data-app="apps">
          <span class="start-item-icon"><img src="assets/icons/world.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Web Apps</span>
        </div>
        <div class="start-item" data-app="settings">
          <span class="start-item-icon"><img src="assets/icons/settings.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Settings</span>
        </div>
        <hr>
        <div class="start-item" id="start-shutdown">
          <span class="start-item-icon"><img src="assets/icons/shutdown.png" width="16" height="16" style="vertical-align:middle;"></span>
          <span class="start-item-label">Shut Down...</span>
        </div>
      </div>
    </div>
  </div>

  <div id="taskbar">
    <button id="start-button">
      <span class="start-logo"><img src="assets/icons/windows_button.png" width="16" height="16" style="vertical-align:middle;"></span>
      <span>Start</span>
    </button>
    <div id="taskbar-items"></div>
    <div id="system-tray">
      <span id="clock"></span>
    </div>
  </div>

  <script src="js/desktop.js"></script>
</body>
</html>
