<!DOCTYPE HTML PUBLIC "-//W3C//DTD HTML 3.2 Final//EN">
<html>
<head>
<title>good hope /// 404</title>
<style>
body { background: #000; margin: 0; padding: 0; height: 100vh; display: flex; align-items: center; justify-content: center; }
.win-box { background: #c0c0c0; border: 2px solid #fff; border-right-color: #808080; border-bottom-color: #808080; padding: 0; box-shadow: 4px 4px 0 rgba(0,0,0,0.2); font-family: "MS Sans Serif", "Arial", sans-serif; width: 420px; }
.titlebar { background: #000080; color: #fff; padding: 3px 4px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 4px; }
.titlebar img { width: 14px; height: 14px; }
.titlebar-text { flex: 1; }
.titlebar-close { background: #c0c0c0; color: #000; border: 1px solid #fff; border-right-color: #808080; border-bottom-color: #808080; padding: 0 6px; font-size: 11px; cursor: pointer; line-height: 16px; }
.titlebar-close:active { border: 1px solid #808080; border-right-color: #fff; border-bottom-color: #fff; }
.content { padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
.icon { font-size: 32px; }
.message { font-size: 12px; color: #000; flex: 1; }
.message h1 { font-size: 14px; margin: 0 0 8px 0; }
.btn-row { text-align: center; padding: 0 16px 12px 16px; }
.btn-ok { background: #c0c0c0; border: 2px solid #fff; border-right-color: #808080; border-bottom-color: #808080; padding: 3px 24px; font-size: 11px; font-family: "MS Sans Serif", sans-serif; cursor: pointer; }
.btn-ok:active { border: 2px solid #808080; border-right-color: #fff; border-bottom-color: #fff; }
.details { font-size: 10px; color: #666; margin-top: 6px; }
</style>
</head>
<body bgcolor="#000" text="#000000" link="#0000ff">

<center>
<div class="win-box">
<div class="titlebar">
<img src="../assets/icons/msg_error-0.png" alt="!" width="14" height="14">
<span class="titlebar-text">Good Hope Browser</span>
<span class="titlebar-close" onclick="history.back()">✕</span>
</div>
<div class="content">
<div class="icon"><img src="../assets/icons/msg_error-0.png" width="32" height="32" alt="Error"></div>
<div class="message">
<h1>Page Not Found</h1>
<b>The page you are looking for does not exist.</b><br><br>
It may have been moved, deleted, or perhaps it never existed at all. Some pages are like that.<br><br>
<a href="index.html">Return to the main page</a>
<div class="details">
Error 404 — File not found<br>
the good hope project &copy; 2026
</div>
</div>
</div>
<div class="btn-row">
<button class="btn-ok" onclick="location.href='index.html'">OK</button>
</div>
</div>
</center>

</body>
</html>
